    <section class="appointment-section">
    <div class="appointment-container">
        <h2>Book Your Appointment</h2>
        <p>Start your fitness journey with us 💪</p>

        <form action="appointment.php" method="POST" onsubmit="return validateForm()">
            
            <input type="text" name="name" id="name" placeholder="Full Name" required>
            
            <input type="email" name="email" id="email" placeholder="Email Address" required>
            
            <input type="text" name="phone" id="phone" placeholder="Mobile Number" required>
            
            <input type="date" name="date" required>
            
            <textarea name="message" placeholder="Your Message (Optional)"></textarea>
            
            <button type="submit">Book Now</button>
        </form>
    </div>
</section>
